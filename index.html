<h1>Find Resources</h1>

<button onclick="test()">Test Recommendation</button>

<div id="results"></div>

<script>

function test(){
    const apiUrl = "https://func-eap-dev-gjavggg2b4fdbpc7.australiaeast-01.azurewebsites.net/api/recommend?q1=beginner&q2=api&q3=external";
    
    fetch(apiUrl)
        .then(res => res.json())
        .then(data => {
            if(data.resources && data.resources.length > 0){
                const resource = data.resources[0];
                document.getElementById("results").innerHTML = 
                    `<p><strong>${resource.title}</strong></p><p><a href="${resource.link}" target="_blank">${resource.link}</a></p>`;
            } else {
                document.getElementById("results").innerHTML = 
                    "No resources found";
            }
        })
        .catch(error => {
            document.getElementById("results").innerHTML = 
                "Error: " + error.message;
        });
}

</script>
